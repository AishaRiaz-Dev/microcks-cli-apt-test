name: Generate APT Repository

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Aptly and Environment
        run: |
          sudo apt-get update && sudo apt-get install -y aptly
          # Initialize the repo structure
          aptly repo create -architectures=amd64 -component=main -distribution=stable microcks-cli-repo

      - name: Build Dummy Package
        run: |
          # Use absolute workspace paths to ensure the runner finds directories
          export WORKSPACE=$GITHUB_WORKSPACE
          mkdir -p $WORKSPACE/mock-pkg/DEBIAN
          mkdir -p $WORKSPACE/dist
          
          # Create the control file
          echo -e "Package: microcks-cli\nVersion: 1.0.0\nArchitecture: amd64\nMaintainer: Me\nDescription: Test" > $WORKSPACE/mock-pkg/DEBIAN/control
          
          # Build the .deb file
          dpkg-deb --build $WORKSPACE/mock-pkg $WORKSPACE/dist/microcks-cli_1.0.0_linux_amd64.deb
          
          # Add to aptly
          aptly repo add -force-replace=true microcks-cli-repo $WORKSPACE/dist/

      - name: Publish Repository
        run: |
          mkdir -p public
          # Publish the repository to the public folder
          aptly publish repo -skip-signing=true -architectures=amd64 -force-overwrite=true microcks-cli-repo public
          
          # Add a landing page to fix 404 error
          echo "<h1>Microcks CLI APT Repository</h1><p>Metadata endpoints are active.</p>" > public/index.html
          
          # Ensure GitHub Pages doesn't ignore the aptly structure
          touch public/.nojekyll 

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'public'

            - name: Deploy APT Files to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .  # This publishes everything in your root folder
          publish_branch: gh-pages
