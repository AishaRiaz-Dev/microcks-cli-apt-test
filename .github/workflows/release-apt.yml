name: Generate APT Repository

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-publish:
    environment:
      name: github-pages
      url: https://AishaRiaz-Dev.github.io/microcks-cli-apt-test/
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Base
        uses: actions/checkout@v4

      - name: Initialize Direct Architecture Framework
        run: |
          mkdir -p public
          echo "<h1>Microcks CLI APT Repository Sandbox Live</h1>" > public/index.html

      - name: Upload Static Web Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'public'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
